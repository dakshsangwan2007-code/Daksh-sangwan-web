<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
    font-family: Arial, sans-serif;
    background-color: #1a1a2e;
    color: white;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: 0 auto;
}

header h1 {
    text-align: center;
    margin-bottom: 30px;
}

.main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.card {
    background: #ffffff;
    color: #333;
    padding: 20px;
    border-radius: 8px;
    min-height: 200px;
}

.console-card {
    margin-top: 20px;
    background: #0f3460;
    color: #e0e0e0;
}

.console-box {
    background: #000;
    padding: 10px;
    font-family: monospace;
    height: 150px;
    overflow-y: auto;
    border-radius: 4px;
    color: #00ff00;
}

.search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

input {
    flex: 1;
    padding: 8px;
}

button {
    background-color: #e94560;
    color: white;
    border: none;
    padding: 8px 15px;
    cursor: pointer;
}

.history-section ul {
    list-style: none;
    padding: 0;
}

.history-section li {
    padding: 5px;
    cursor: pointer;
    color: #0f3460;
    text-decoration: underline;
}

.error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Async Weather Tracker</h1>
        </header>

        <div class="main-grid">
            <section class="card">
                <h3>Search City</h3>
                <div class="search-box">
                    <input type="text" id="cityInput" placeholder="Enter city name...">
                    <button id="searchBtn">Search</button>
                </div>
                <div class="history-section">
                    <h4>Search History</h4>
                    <ul id="historyList"></ul>
                </div>
            </section>

            <section class="card">
                <h3>Weather Info</h3>
                <div id="weatherDisplay">
                    <p>Enter a city to see weather details.</p>
                </div>
            </section>
        </div>

        <section class="card console-card">
            <h3>Console - Event Loop</h3>
            <div id="eventLog" class="console-box">
                </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>

<script>
    const apiKey = '397cdd2813f41ce48658ca2a7be89179'; 
const searchBtn = document.getElementById('searchBtn');
const cityInput = document.getElementById('cityInput');
const weatherDisplay = document.getElementById('weatherDisplay');
const historyList = document.getElementById('historyList');
const eventLog = document.getElementById('eventLog');

function logEvent(message) {
    const entry = document.createElement('div');
    entry.textContent = `> ${message}`;
    eventLog.appendChild(entry);
    console.log(message);
}

window.onload = () => {
    const history = JSON.parse(localStorage.getItem('weatherHistory')) || [];
    renderHistory(history);
};

async function fetchWeather(city) {

    logEvent("Sync Start"); 

    Promise.resolve().then(() => logEvent("Promise .then (Microtask)")); 

    setTimeout(() => logEvent("setTimeout (Macrotask)"), 0);

    logEvent("(ASYNC) START fetching..."); 

    try {
        const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`);
        
        if (!response.ok) {
            throw new Error("City not found"); 
        }

        const data = await response.json();
        logEvent("(ASYNC) Data received"); 
        
        displayWeather(data);
        saveToHistory(city);

    } catch (error) {
        weatherDisplay.innerHTML = `<p class="error">${error.message}</p>`;
        logEvent(`Error: ${error.message}`);
    }

    logEvent("Done"); 
}

function displayWeather(data) {
    weatherDisplay.innerHTML = `
        <h4>${data.name}, ${data.sys.country}</h4>
        <p>Temp: ${data.main.temp}°C</p>
        <p>Weather: ${data.weather[0].main}</p>
        <p>Humidity: ${data.main.humidity}%</p>
        <p>Wind: ${data.wind.speed} m/s</p>
    `;
}


function saveToHistory(city) {
    let history = JSON.parse(localStorage.getItem('weatherHistory')) || [];
    if (!history.includes(city)) {
        history.push(city);
        localStorage.setItem('weatherHistory', JSON.stringify(history));
        renderHistory(history);
    }
}

function renderHistory(history) {
    historyList.innerHTML = history.map(city => 
        `<li onclick="fetchWeather('${city}')">${city}</li>`
    ).join('');
}

searchBtn.addEventListener('click', () => {
    const city = cityInput.value.trim();
    if (city) fetchWeather(city);
});
</script>
